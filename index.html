<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SSP Montilla | Escaneo</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root{
      --bg:#ffffff;
      --card:#f4f4f6;
      --line:#d9d9df;
      --text:#111;
      --muted:#666;
      --btn:#1677ff;
      --btnText:#fff;
      --bad:#d93025;
      --ok:#1e8e3e;
      --r:14px;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:var(--sans);
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      width:min(100%, 1100px);
      margin:0 auto;
      padding:16px;
    }

    .header{
      display:flex;
      align-items:center;
      gap:14px;
      padding:8px 4px 14px;
    }

    .logoBox{
      width:62px;
      height:62px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      flex:0 0 auto;
    }

    .logoBox img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    .titleBox{ flex:1 1 auto; }

    h2{
      margin:0;
      font-size:22px;
      line-height:1.1;
    }

    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .appGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:14px;
    }

    #reader{
      width:100%;
      min-height:320px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#000;
    }

    .btnrow{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    button{
      width:100%;
      min-height:50px;
      border:none;
      border-radius:12px;
      padding:12px 14px;
      font-weight:700;
      font-size:15px;
      background:var(--btn);
      color:var(--btnText);
      cursor:pointer;
    }

    button.secondary{
      background:#fff;
      color:#111;
      border:1px solid var(--line);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    label{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
      font-weight:600;
      letter-spacing:.2px;
    }

    input, textarea, select{
      width:100%;
      min-height:46px;
      padding:11px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      outline:none;
      font-size:15px;
    }

    textarea{
      min-height:84px;
      resize:vertical;
    }

    .formGrid{
      display:grid;
      grid-template-columns:1fr;
      gap:0 12px;
    }

    .field-full{
      grid-column:1 / -1;
    }

    .hidden{ display:none; }

    .status{
      margin-top:12px;
      font-size:13px;
      border:1px dashed var(--line);
      border-radius:12px;
      padding:12px;
      color:var(--muted);
      white-space:pre-wrap;
      background:#fff;
    }

    .bad{ color:var(--bad); }
    .ok{ color:var(--ok); }

    .sectionTitle{
      margin:0 0 8px;
      font-size:15px;
      font-weight:700;
      color:#222;
    }

    .note{
      margin-top:6px;
      font-size:12px;
      color:var(--bad);
      font-weight:700;
    }

    .scanControls{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      margin-top:12px;
    }

    .hint{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
    }

    @media (min-width: 700px){
      .wrap{ padding:20px; }

      .formGrid{
        grid-template-columns:1fr 1fr;
      }

      .scanControls{
        grid-template-columns:1.1fr .9fr;
        align-items:end;
      }

      .btnrow{
        flex-wrap:nowrap;
      }

      #reader{
        min-height:360px;
      }
    }

    @media (min-width: 920px){
      .appGrid{
        grid-template-columns:420px 1fr;
        align-items:start;
      }

      .stickyCard{
        position:sticky;
        top:14px;
      }

      #reader{
        min-height:420px;
      }

      h2{ font-size:24px; }
      .sub{ font-size:15px; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="header">
      <div class="logoBox">
        <img src="logo.png" alt="Logo" id="logoImg"
             onerror="this.style.display='none'; document.getElementById('logoPlaceholder').style.display='block';">
        <span id="logoPlaceholder" style="color:#999;font-size:11px;display:none;">LOGO</span>
      </div>
      <div class="titleBox">
        <h2>Escaneo de Material</h2>
        <p class="sub">Escanea el código QR y registra la evidencia.</p>
      </div>
    </div>

    <div class="appGrid">
      <div class="card stickyCard">
        <p class="sectionTitle">Escáner</p>
        <div id="reader"></div>

        <div class="scanControls">
          <div>
            <label>Cámara</label>
            <select id="cameraSelect"></select>
          </div>

          <div class="btnrow" style="margin-top:0;">
            <button id="btnStart" type="button">Iniciar</button>
            <button id="btnRetry" type="button" class="secondary">Reintentar</button>
          </div>
        </div>

        <div class="status" id="scanState">Estado: listo</div>
      </div>

      <form id="form" class="card">
        <p class="sectionTitle">Registro</p>

        <input type="hidden" id="qr_raw">
        <input type="hidden" id="area_full">
        <input type="hidden" id="area_code">
        <input type="hidden" id="atados_norm">
        <input type="hidden" id="atado_actual">
        <input type="hidden" id="atados_total">
        <input type="hidden" id="medida">
        <input type="hidden" id="pn">

        <div class="formGrid">

          <div>
            <label>Planta</label>
            <select id="planta">
              <option value="">-- Selecciona planta --</option>
              <option value="Hidalgo">Hidalgo</option>
              <option value="Bosques">Bosques</option>
              <option value="Ganadera">Ganadera</option>
            </select>
            <div class="hint" id="plantaHint">Si el QR incluye planta o código de planta, se seleccionará automáticamente.</div>
          </div>

          <div>
            <label>Pedido</label>
            <input id="pedido" readonly>
          </div>

          <div>
            <label>Número de parte</label>
            <input id="pn_view" readonly>
          </div>

          <div class="field-full">
            <label>Descripción</label>
            <textarea id="descripcion" readonly></textarea>
          </div>

          <div>
            <label>Cantidad</label>
            <input id="cantidad" readonly>
          </div>

          <div>
            <label>Atados</label>
            <input id="atados_view" readonly placeholder="56/78">
          </div>

          <div class="field-full">
            <label>Operador / Soldador</label>
            <select id="operador">
              <option value="">-- Escanea un QR --</option>
            </select>
          </div>

          <div>
            <label>¿Cantidad correcta?</label>
            <select id="cantidad_ok">
              <option value="">--</option>
              <option value="Sí">Sí</option>
              <option value="No">No</option>
            </select>
          </div>

          <div id="realWrap" class="hidden">
            <label>Cantidad real</label>
            <input id="cantidad_real" type="number" min="0" inputmode="numeric">
          </div>

          <div class="field-full">
            <label>Observaciones</label>
            <textarea id="observaciones"></textarea>
          </div>

          <div class="field-full">
            <label>Foto evidencia</label>
            <input id="foto" type="file" accept="image/*" capture="environment">
            <div class="note">Obligatoria para registrar</div>
          </div>

          <div class="field-full">
            <div class="btnrow" style="margin-top:14px;">
              <button id="btnSend" type="submit" disabled>Registrar</button>
            </div>
          </div>
        </div>

        <div class="status" id="logBox">LOG: esperando QR…</div>
      </form>
    </div>
  </div>

<script>
(() => {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbfT9RDX2ZNzLstarhXNzMuIuxD2_og1yOD_9YS0gOroqfj0OCu6xZfEsJD-hybK5y/exec";
  const APP_VERSION = "planta-select-qr-v3";

  let html5Qr = null;
  let lastScanText = "";
  let lastScanAt = 0;
  const DUP_WINDOW_MS = 2500;
  let isSubmitting = false;

  const $ = (id) => document.getElementById(id);
  const scanState = $("scanState");
  const logBox = $("logBox");
  const btnStart = $("btnStart");
  const btnRetry = $("btnRetry");
  const btnSend = $("btnSend");
  const cameraSelect = $("cameraSelect");
  const cantidadOk = $("cantidad_ok");
  const realWrap = $("realWrap");
  const cantidadReal = $("cantidad_real");
  const fotoInput = $("foto");
  const plantaInput = $("planta");
  const plantaHint = $("plantaHint");

  plantaInput.value = localStorage.getItem("ssp_planta") || "";

  plantaInput.addEventListener("change", () => {
    if (!plantaInput.disabled) {
      localStorage.setItem("ssp_planta", plantaInput.value);
    }
    refreshRegisterState();
  });

  function setScanStatus(msg, cls="") {
    scanState.className = "status " + cls;
    scanState.textContent = "Estado: " + msg;
  }

  function log(msg, bad=false) {
    logBox.className = "status " + (bad ? "bad" : "");
    logBox.textContent = "LOG: " + msg;
  }

  function hasQrLoaded(){
    return !!$("qr_raw").value;
  }

  function hasPhotoSelected(){
    return !!fotoInput.files?.[0];
  }

  function hasPlant(){
    return !!plantaInput.value;
  }

  function refreshRegisterState(){
    btnSend.disabled = !(hasQrLoaded() && hasPhotoSelected() && hasPlant()) || isSubmitting;
  }

  function errorToMessage(err) {
    if (!err) return "Error desconocido";
    if (err instanceof Error && err.message) return err.message;
    if (typeof err === "string") return err;
    if (err && typeof err.message === "string" && err.message.trim()) return err.message;
    if (err && err.type) return "Error del navegador: " + err.type;
    try { return JSON.stringify(err); } catch (_) {}
    return String(err);
  }

  function normalizeText_(s){
    return String(s || "")
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/[^\w\s]/g," ")
      .toLowerCase()
      .trim()
      .replace(/\s+/g," ");
  }

  function normalizePlantFromQr(rawPlant){
    const p = normalizeText_(rawPlant);

    const map = {
      "h": "Hidalgo",
      "hid": "Hidalgo",
      "hgo": "Hidalgo",
      "hidalgo": "Hidalgo",

      "b": "Bosques",
      "bos": "Bosques",
      "bosq": "Bosques",
      "bosques": "Bosques",

      "g": "Ganadera",
      "gan": "Ganadera",
      "gdr": "Ganadera",
      "ganadera": "Ganadera"
    };

    return map[p] || "";
  }

  function areaToCode2(areaFull){
    if(!areaFull) return "";
    const MAP = {
      "soldadura": "SL",
      "corte": "CT",
      "roll former": "RF",
      "embarques": "EM",
      "dobles y troquel": "DT",
      "pintura": "PN",
      "rodamientos": "RD",
      "bosques rf": "BRF",
      "bosques": "BS",
      "fexder": "FX"
    };
    const ALIAS = {
      "rollformer": "roll former",
      "doblesytroquel": "dobles y troquel"
    };

    let norm = normalizeText_(areaFull);
    const compact = norm.replace(/\s/g,"");
    if (ALIAS[compact]) norm = ALIAS[compact];
    if (MAP[norm]) return MAP[norm];

    const stop = new Set(["y","de","del","la","las","el","los","area","linea","etc"]);
    const words = norm.split(" ").filter(w => w && !stop.has(w));
    if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
    if (words.length === 1) {
      const w = words[0].toUpperCase();
      return (w[0] || "X") + (w[1] || w[0] || "X");
    }
    return "XX";
  }

  function safeInt(s){
    const n = Number(String(s).trim());
    return Number.isFinite(n) ? n : null;
  }

  function normalizeAtados(text){
    if (!text) return { ok:false };
    let t = String(text).trim();
    t = t.replace(/\s+/g," ");
    t = t.replace(/de/gi,"/");
    t = t.replace(/\\/g,"/");
    t = t.replace(/-/g,"/");
    t = t.replace(/\s*\/\s*/g,"/").trim();
    const parts = t.split("/");
    if (parts.length !== 2) return { ok:false };
    const a = safeInt(parts[0]);
    const b = safeInt(parts[1]);
    if (a === null || b === null || b <= 0 || a < 0) return { ok:false };
    return { ok:true, a, b, norm:`${a}/${b}` };
  }

  function parseQR(raw){
    const parts = String(raw).split("|").map(x => x.trim());

    // Nuevo formato: Planta|Area|Pedido|Descripcion|Cantidad|Atados|Medida|Partnumber
    if (parts.length >= 8) {
      const [planta, area, pedido, descripcion, cantidad, atados, medida, pn] = parts;

      const cant = safeInt(cantidad);
      if (cant === null || cant < 0) return { ok:false, error:`Cantidad inválida: ${cantidad}` };

      const at = normalizeAtados(atados);
      if (!at.ok) return { ok:false, error:`Atados inválido: ${atados}` };

      return {
        ok:true,
        data: {
          qr_raw: raw,
          planta,
          plantaFromQr: true,
          area_full: area,
          area_code: areaToCode2(area),
          pedido,
          descripcion,
          cantidad: String(cant),
          atados_norm: at.norm,
          atado_actual: String(at.a),
          atados_total: String(at.b),
          medida,
          pn
        }
      };
    }

    // Formato viejo: Area|Pedido|Descripcion|Cantidad|Atados|Medida|Partnumber
    if (parts.length === 7) {
      const [area, pedido, descripcion, cantidad, atados, medida, pn] = parts;

      const cant = safeInt(cantidad);
      if (cant === null || cant < 0) return { ok:false, error:`Cantidad inválida: ${cantidad}` };

      const at = normalizeAtados(atados);
      if (!at.ok) return { ok:false, error:`Atados inválido: ${atados}` };

      return {
        ok:true,
        data: {
          qr_raw: raw,
          planta: "",
          plantaFromQr: false,
          area_full: area,
          area_code: areaToCode2(area),
          pedido,
          descripcion,
          cantidad: String(cant),
          atados_norm: at.norm,
          atado_actual: String(at.a),
          atados_total: String(at.b),
          medida,
          pn
        }
      };
    }

    return { ok:false, error:`QR incompleto (${parts.length}). Esperado: 8 campos con Planta o 7 campos formato viejo.` };
  }

  function fillMinimal(d){
    $("qr_raw").value = d.qr_raw;
    $("area_full").value = d.area_full;
    $("area_code").value = d.area_code;
    $("atados_norm").value = d.atados_norm;
    $("atado_actual").value = d.atado_actual;
    $("atados_total").value = d.atados_total;
    $("medida").value = d.medida;
    $("pn").value = d.pn;

    $("pedido").value = d.pedido;
    $("descripcion").value = d.descripcion;
    $("cantidad").value = d.cantidad;
    $("atados_view").value = d.atados_norm;
    $("pn_view").value = d.pn;

    const plantFromQr = normalizePlantFromQr(d.planta);

    if (d.plantaFromQr && plantFromQr) {
      plantaInput.value = plantFromQr;
      plantaInput.disabled = true;
      plantaHint.textContent = `Planta detectada desde QR: ${plantFromQr}`;
    } else {
      plantaInput.disabled = false;
      if (!plantaInput.value) {
        plantaInput.value = localStorage.getItem("ssp_planta") || "";
      }
      plantaHint.textContent = d.plantaFromQr
        ? "El QR trae planta, pero no coincide con catálogo. Selecciónala manualmente."
        : "QR viejo detectado. Selecciona la planta manualmente.";
    }
  }

  async function loadOperators(areaFull){
    const sel = $("operador");
    sel.innerHTML = `<option value="">Cargando…</option>`;

    try{
      const url = `${SCRIPT_URL}?action=operators&area=${encodeURIComponent(areaFull)}`;
      const res = await fetch(url, { method:"GET" });
      const data = await res.json();
      if(!res.ok || data.ok === false) throw new Error(data.error || "No se pudo leer Personal");

      const ops = (data.operators || []).filter(Boolean);
      if(!ops.length){
        sel.innerHTML = `<option value="">(Sin operadores en Personal)</option>`;
        return;
      }
      sel.innerHTML = `<option value="">-- Selecciona --</option>` + ops.map(o => `<option>${escapeHtml(o)}</option>`).join("");
    }catch(err){
      sel.innerHTML = `<option value="">(Error al cargar)</option>`;
      log("Error operadores: " + errorToMessage(err), true);
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#039;"
    }[m]));
  }

  function fileToImage(file){
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        URL.revokeObjectURL(url);
        resolve(img);
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error(`No se pudo abrir la imagen seleccionada (${file?.type || "sin tipo"}).`));
      };

      img.src = url;
    });
  }

  function fit(w,h,maxDim){
    const s = Math.min(1, maxDim / Math.max(w,h));
    return { w: Math.round(w*s), h: Math.round(h*s) };
  }

  function blobToBase64(blob){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result).split(",")[1] || "");
      r.onerror = () => reject(new Error("No se pudo leer la imagen seleccionada."));
      r.readAsDataURL(blob);
    });
  }

  async function compressToJpegBase64(file, maxDim=1024, quality=0.7){
    if (!file) throw new Error("No se recibió archivo.");
    if (!String(file.type || "").startsWith("image/")) {
      throw new Error(`El archivo no es una imagen válida: ${file.type || "sin tipo"}`);
    }

    const img = await fileToImage(file);
    const c = document.createElement("canvas");
    const ctx = c.getContext("2d");

    if (!ctx) throw new Error("No se pudo crear el canvas para la foto.");

    const s = fit(img.width, img.height, maxDim);
    c.width = s.w;
    c.height = s.h;
    ctx.drawImage(img, 0, 0, s.w, s.h);

    const blob = await new Promise((resolve, reject) => {
      c.toBlob((b) => {
        if (!b) {
          reject(new Error("No se pudo convertir la imagen a JPEG."));
          return;
        }
        resolve(b);
      }, "image/jpeg", quality);
    });

    return {
      base64: await blobToBase64(blob),
      mime:"image/jpeg",
      filename:"evidencia.jpg"
    };
  }

  async function loadCameras(){
    const cams = await Html5Qrcode.getCameras();
    if(!cams || !cams.length) throw new Error("Sin cámaras disponibles");

    cameraSelect.innerHTML = cams.map(c => `<option value="${c.id}">${c.label || "Cámara"}</option>`).join("");

    const idxBack = cams.findIndex(c => {
      const s = (c.label || "").toLowerCase();
      return s.includes("back") || s.includes("environment") || s.includes("rear");
    });
    if(idxBack >= 0) cameraSelect.value = cams[idxBack].id;
  }

  async function startScan(){
    html5Qr = html5Qr || new Html5Qrcode("reader");
    setScanStatus("escaneando…", "ok");

    try{
      await loadCameras();
      const camId = cameraSelect.value;

      try { if (html5Qr.isScanning) await html5Qr.stop(); } catch(_){}

      await html5Qr.start(
        camId,
        { fps: 10, qrbox: { width: 240, height: 240 } },
        async (text) => {
          const now = Date.now();
          if(text === lastScanText && (now - lastScanAt) < DUP_WINDOW_MS) return;
          lastScanText = text;
          lastScanAt = now;

          const parsed = parseQR(text);
          if(!parsed.ok){
            setScanStatus("QR inválido", "bad");
            log(parsed.error, true);
            refreshRegisterState();
            return;
          }

          fillMinimal(parsed.data);
          await loadOperators(parsed.data.area_full);

          setScanStatus("QR OK (" + parsed.data.area_code + ")", "ok");
          if (parsed.data.plantaFromQr) {
            log(hasPhotoSelected()
              ? "QR nuevo detectado. Planta cargada. Listo para registrar."
              : "QR nuevo detectado. Planta cargada. Falta adjuntar foto.");
          } else {
            log(hasPhotoSelected()
              ? "QR viejo detectado. Verifica planta y registra."
              : "QR viejo detectado. Selecciona planta y adjunta foto.");
          }

          refreshRegisterState();

          try { if (html5Qr.isScanning) await html5Qr.stop(); } catch(_){}
        },
        () => {}
      );
    }catch(err){
      setScanStatus("permiso/cámara falló", "bad");
      log(errorToMessage(err), true);
      refreshRegisterState();
    }
  }

  async function retry(){
    lastScanText = "";
    lastScanAt = 0;
    setScanStatus("listo");
    log("esperando QR…");

    $("qr_raw").value = "";
    $("area_full").value = "";
    $("area_code").value = "";
    $("atados_norm").value = "";
    $("atado_actual").value = "";
    $("atados_total").value = "";
    $("medida").value = "";
    $("pn").value = "";

    $("pedido").value = "";
    $("descripcion").value = "";
    $("cantidad").value = "";
    $("atados_view").value = "";
    $("pn_view").value = "";

    plantaInput.disabled = false;
    plantaInput.value = localStorage.getItem("ssp_planta") || "";
    plantaHint.textContent = "Si el QR incluye planta o código de planta, se seleccionará automáticamente.";

    $("operador").innerHTML = `<option value="">-- Escanea un QR --</option>`;
    $("cantidad_ok").value = "";
    $("cantidad_real").value = "";
    $("observaciones").value = "";
    $("foto").value = "";
    realWrap.classList.add("hidden");

    refreshRegisterState();
    await startScan();
  }

  function validate(){
    if(!hasQrLoaded()) return "Primero escanea un QR.";
    if(!plantaInput.value) return "Selecciona la Planta.";
    if(!$("operador").value) return "Selecciona Operador/Soldador.";
    if(!cantidadOk.value) return "Selecciona si la cantidad es correcta.";
    if(!hasPhotoSelected()) return "La foto evidencia es obligatoria.";
    if(cantidadOk.value === "No"){
      const n = Number(cantidadReal.value);
      if(!Number.isFinite(n) || n <= 0) return "Captura Cantidad real (>0).";
    }
    return "";
  }

  function buildPayload(){
    return {
      timestamp: new Date().toISOString(),
      qr_raw: $("qr_raw").value,
      planta: plantaInput.value,
      area: $("area_full").value,
      area_code: $("area_code").value,
      operador: $("operador").value,

      pedido: $("pedido").value,
      descripcion: $("descripcion").value,
      cantidad: $("cantidad").value,

      atados_norm: $("atados_norm").value,
      atado_actual: $("atado_actual").value,
      atados_total: $("atados_total").value,

      medida: $("medida").value,
      pn: $("pn").value,

      cantidad_ok: $("cantidad_ok").value,
      cantidad_real: $("cantidad_real").value ? Number($("cantidad_real").value) : null,
      observaciones: $("observaciones").value.trim(),
      foto: null
    };
  }

  fotoInput.addEventListener("change", (e) => {
    const file = e.target.files?.[0];

    if (!file) {
      log(hasQrLoaded() ? "QR listo. Falta adjuntar foto." : "Sin foto seleccionada.");
      refreshRegisterState();
      return;
    }

    log(`Foto lista: ${file.name || "sin nombre"} | ${file.type || "sin tipo"} | ${file.size || 0} bytes`);
    refreshRegisterState();
  });

  $("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const err = validate();
    if(err) return log(err, true);

    if (isSubmitting) return;
    isSubmitting = true;
    refreshRegisterState();
    btnSend.textContent = "Enviando…";

    try{
      const payload = buildPayload();
      const file = fotoInput.files?.[0];

      payload.foto = await compressToJpegBase64(file, 1024, 0.7);

      const res = await fetch(SCRIPT_URL, {
        method:"POST",
        redirect:"follow",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      const raw = await res.text();

      let json;
      try {
        json = JSON.parse(raw);
      } catch (_) {
        throw new Error(raw || "La respuesta del servidor no fue válida.");
      }

      if(!res.ok || json.ok === false) {
        throw new Error(json.error || "Error al guardar");
      }

      log("Registrado ✅ Fila: " + json.row + (json.fileUrl ? " | Foto guardada" : ""));
    }catch(ex){
      console.error("Error submit:", ex);
      log(errorToMessage(ex), true);
    }finally{
      isSubmitting = false;
      btnSend.textContent = "Registrar";
      refreshRegisterState();
    }
  });

  btnStart.addEventListener("click", startScan);
  btnRetry.addEventListener("click", retry);

  cantidadOk.addEventListener("change", () => {
    if(cantidadOk.value === "No"){
      realWrap.classList.remove("hidden");
      cantidadReal.focus();
    }else{
      realWrap.classList.add("hidden");
      cantidadReal.value = "";
    }
  });

  setScanStatus("listo");
  log("Versión: " + APP_VERSION + " | esperando QR…");
  refreshRegisterState();
})();
</script>
</body>
</html>
